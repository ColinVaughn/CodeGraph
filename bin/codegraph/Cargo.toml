[package]
name = "codegraph"
edition.workspace = true
version.workspace = true
license.workspace = true
rust-version.workspace = true
description = "CodeGraph CLI — build and query a code knowledge graph."

[[bin]]
name = "codegraph"
path = "src/main.rs"

[features]
# Live Postgres introspection for `codegraph ingest pg` (off by default).
pg = ["codegraph-ingest/pg"]
# Media transcription for `codegraph ingest media` + YouTube URLs (shells out to
# yt-dlp / a transcription CLI; off by default).
media = ["codegraph-ingest/media"]
# Office spreadsheet ingest for `codegraph ingest office` (calamine; off by default).
office = ["codegraph-ingest/office"]
# Google-Workspace ingest for `codegraph ingest gws` (shells out to the gws CLI; off by default).
gws = ["codegraph-ingest/gws"]
# Live Neo4j/FalkorDB push for `codegraph export neo4j|falkordb --push` (off by default).
push = ["codegraph-output/push"]
# Store the per-file AST cache as MessagePack instead of JSON. On by default via
# codegraph-extract's default features (this flag is the explicit re-enable knob).
cache-binary = ["codegraph-extract/cache-binary"]
# Live database EXPLAIN for `sql audit --explain` (sqlx; off by default).
live-explain = ["codegraph-sqlaudit/live-explain"]

[dependencies]
codegraph-core = { workspace = true }
codegraph-detect = { workspace = true }
codegraph-extract = { workspace = true }
codegraph-graph = { workspace = true }
codegraph-output = { workspace = true }
codegraph-report = { workspace = true }
codegraph-query = { workspace = true }
codegraph-llm = { workspace = true }
codegraph-semantic = { workspace = true }
codegraph-incremental = { workspace = true }
codegraph-prs = { workspace = true }
codegraph-server = { workspace = true }
codegraph-ingest = { workspace = true }
codegraph-skillgen = { workspace = true }
codegraph-workspace = { workspace = true }
codegraph-history = { workspace = true }
codegraph-cgql = { workspace = true }
codegraph-refactor = { workspace = true }
codegraph-predict = { workspace = true }
codegraph-sandbox = { workspace = true }
codegraph-eval = { workspace = true }
codegraph-sqlaudit = { workspace = true }
clap = { workspace = true }
anyhow = { workspace = true }
rayon = { workspace = true }
tokio = { workspace = true }
serde_json = { workspace = true }
notify = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
tempfile = { workspace = true }
serde_json = { workspace = true }
